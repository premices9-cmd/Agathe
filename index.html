</div>    <script type="module">    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";    
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";    
  
    const firebaseConfig = {    
        apiKey: "AIzaSyDSK9sIPu8fvGebZQG9EdHBhlf7nl8Dmzs",    
        authDomain: "mka-mobile-money.firebaseapp.com",    
        databaseURL: "https://mka-mobile-money-default-rtdb.firebaseio.com",    
        projectId: "mka-mobile-money"    
    };    
  
    const app = initializeApp(firebaseConfig);    
    const db = getDatabase(app);    
    let data = { caisse:{USD:0, CDF:0}, operators:[], types:[], transactions:[], taux:2800, config: { pinAdmin: "1234", pinUser: "0000" }, debts: {} };    
  
    onValue(ref(db, 'mka_data'), (snap) => {     
        if(snap.val()) {     
            data = snap.val();     
            if(!data.transactions) data.transactions = [];     
            if(!data.types) data.types = [];  
            if(!data.operators) data.operators = [];  
            if(!data.config) data.config = { pinAdmin: "1234", pinUser: "0000" };  
            if(!data.debts) data.debts = {};  
            render();     
        }     
    });    
        
    const save = () => set(ref(db, 'mka_data'), data);    
    const fmt = (n) => parseFloat(n || 0).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).replace(/,/g, '.');    
    const normalize = (str) => str ? str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";    
  
    window.login = () => {    
        const p = document.getElementById("pinInput").value;    
        if(p === data.config.pinAdmin) {    
            document.getElementById("loginSection").classList.add("hidden");    
            document.getElementById("appSection").classList.remove("hidden");    
            document.getElementById("adminSection").classList.remove("hidden");    
            document.getElementById("newPinAdmin").value = data.config.pinAdmin;    
            document.getElementById("newPinUser").value = data.config.pinUser;    
        } else if(p === data.config.pinUser) {    
            document.getElementById("loginSection").classList.add("hidden");    
            document.getElementById("appSection").classList.remove("hidden");    
            document.getElementById("adminSection").classList.add("hidden");    
        } else { alert("Code PIN Incorrect"); }    
    };    
  
    window.logout = () => location.reload();    
  
    window.updatePins = () => {    
        const pa = document.getElementById("newPinAdmin").value, pu = document.getElementById("newPinUser").value;    
        if(pa && pu) { data.config.pinAdmin = pa; data.config.pinUser = pu; save(); alert("PIN mis à jour !"); }    
    };  
  
    window.togglePaySim = () => {    
        const mode = document.getElementById("payMode").value;    
        const motif = normalize(document.getElementById("motif").value);  
        const opIdx = document.getElementById("operatorSelect").value;  
        const opName = data.operators[opIdx] ? normalize(data.operators[opIdx].name) : "";  
        document.getElementById("paySimBox").classList.toggle("hidden", mode !== "virtuel");  
        const isDebt = mode.includes("dette") || mode === "depense" || motif.includes("dette") || opName.includes("dette client") || opName.includes("dette moi");  
        document.getElementById("debtNameBox").classList.toggle("hidden", !isDebt);  
    };    
  
    window.checkDebtBalance = () => {  
        const opIdx = document.getElementById("settleOpIdx").value;  
        const op = data.operators[opIdx];  
        const person = document.getElementById("debtPersonName").value.trim();  
        const statusEl = document.getElementById("debtStatus");  
        if(!person || !op) { statusEl.classList.add("hidden"); return; }  
        const debtKey = `${normalize(op.name)}_${normalize(person)}`;  
        const debt = data.debts[debtKey] || { USD: 0, CDF: 0 };  
        statusEl.innerHTML = `Dette <b>${person}</b>: <b>${fmt(debt.USD)} $</b> | <b>${fmt(debt.CDF)} FC</b>`;  
        statusEl.classList.remove("hidden");  
    };  
  
    window.autoCalcMix = () => {    
        const total = parseFloat(document.getElementById("amount").value) || 0;    
        const usd = parseFloat(document.getElementById("mixUSD").value) || 0;    
        const t = parseFloat(data.taux) || 1;    
        const reste = total - usd;    
        if(reste > 0) document.getElementById("mixCDF").value = Math.round(reste * t);    
    };    
  
 function createTransaction({  
    typeNom,  
    operator,  
    mode,  
    amt,  
    cur,  
    person,  
    stk,
    mix // Nouveau paramètre pour le multi-devise
}){  
    const impacts = {  
        caisse: { USD:0, CDF:0 },  
        operator: { USD:0, CDF:0 },  
        dette: { USD:0, CDF:0 },  
        stock: stk || 0  
    };  

    let typeDette = "";
    if(mode === "dette_client") typeDette = "dette client";
    else if(mode === "dette_moi") typeDette = "dette moi";
    else {
        const opNorm = normalize(operator);
        if(opNorm.includes("dette client")) typeDette = "dette client";
        else if(opNorm.includes("dette moi")) typeDette = "dette moi";
    }

    // On utilise les valeurs mixtes si elles existent, sinon on prend le montant simple
    const finalUSD = (mix && mix.USD) ? mix.USD : (cur === "USD" ? amt : 0);
    const finalCDF = (mix && mix.CDF) ? mix.CDF : (cur === "CDF" ? amt : 0);

    // Si c'est un RÈGLEMENT, on inverse l'impact pour diminuer la dette
    const isReglement = (typeNom === "REGLEMENT");
    const mult = isReglement ? -1 : 1;

    if(typeDette && person){
        impacts.dette.USD = finalUSD * mult;
        impacts.dette.CDF = finalCDF * mult;
    }

    return {  
        id: Date.now(),  
        typeNom,  
        operator,  
        mode,  
        amt: (cur === "USD" ? finalUSD : finalCDF), 
        cur,  
        person,  
        typeDette,
        impacts,
        // On stocke les valeurs réelles pour l'historique
        realUSD: finalUSD,
        realCDF: finalCDF
    };  
}

    function applyImpacts(t, reverse = false) {
    const factor = reverse ? -1 : 1;

    // 1. CAISSE
    if (t.impacts.caisse) {
        data.caisse.USD += (t.impacts.caisse.USD || 0) * factor;
        data.caisse.CDF += (t.impacts.caisse.CDF || 0) * factor;
    }

    // 2. OPÉRATEURS (Argent SIM + STOCK)
    let op = data.operators.find(o => o.name === t.operator);
    if (op) {
        // Impact sur le solde monétaire de la SIM
        op.USD += (t.impacts.operator.USD || 0) * factor;
        op.CDF += (t.impacts.operator.CDF || 0) * factor;
        
        // --- CORRECTION : Impact sur le Stock Physique ---
        if (t.impacts.stock) {
            // Si c'est une vente, t.impacts.stock sera -1, donc op.stock diminue.
            op.stock += (t.impacts.stock * factor);
        }
    }

    // 3. DETTES
    if (t.person && t.typeDette) {
        const key = `${normalize(t.typeDette)}_${normalize(t.person)}`;
        if (!data.debts[key]) data.debts[key] = { USD: 0, CDF: 0 };

        const isReglement = t.typeNom === "REGLEMENT" || (t.desc && t.desc.includes("REGLEMENT"));

        let impUSD = (t.impacts.dette.USD || 0) * factor;
        let impCDF = (t.impacts.dette.CDF || 0) * factor;

        if (isReglement && !reverse) {
            if (impUSD < 0) impUSD = Math.max(impUSD, -data.debts[key].USD);
            if (impCDF < 0) impCDF = Math.max(impCDF, -data.debts[key].CDF);
        }

        data.debts[key].USD += impUSD;
        data.debts[key].CDF += impCDF;

        let typeGlobal = t.typeDette.includes("client") ? "dette client" : "dette moi";
        let opG = data.operators.find(o => normalize(o.name).includes(typeGlobal));

        if (opG) {
            const isSame = opG.name === t.operator;
            if (!isSame || isReglement) {
                opG.USD += impUSD;
                opG.CDF += impCDF;
            }
        }
    }
}


    window.addTransaction = () => {  
    const opI = document.getElementById("operatorSelect").value;
    const tyI = document.getElementById("typeSelect").value;
    const amtSIM = parseFloat(document.getElementById("amount").value) || 0; // Montant sur la SIM
    const cur = document.getElementById("currency").value;
    
    // Récupération des détails Cash (Ce qui touche réellement le tiroir)
    const mixUSD = parseFloat(document.getElementById("mixUSD").value) || 0;
    const mixCDF = parseFloat(document.getElementById("mixCDF").value) || 0;
    const commUSD = parseFloat(document.getElementById("commUSD").value) || 0;
    const commCDF = parseFloat(document.getElementById("commCDF").value) || 0;
    
    const mode = document.getElementById("payMode").value;
    const motif = document.getElementById("motif").value;
    const person = document.getElementById("personName").value.trim();
    const ty = data.types[tyI];
    const op = data.operators[opI];

    if(!ty || !op) return;

    // Calcul de l'argent Réel (Cash + Commission)
    const netCashUSD = mixUSD + commUSD;
    const netCashCDF = mixCDF + commCDF;

    const t = createTransaction({
        typeNom: ty.name,
        operator: op.name,
        mode,
        amt: amtSIM, // On garde le montant SIM pour l'impact Opérateur
        cur,
        person,
        stk: parseInt(document.getElementById("stkMove").value) || 0,
        mix: { USD: mixUSD, CDF: mixCDF } 
    });

    // --- LOGIQUE D'IMPACT STRICTE ---
    
    // 1. Impact SIM : Toujours basé sur "Montant Opération"
    t.impacts.operator.USD = (cur === "USD" ? amtSIM : 0) * (parseInt(ty.impO) || 0);
    t.impacts.operator.CDF = (cur === "CDF" ? amtSIM : 0) * (parseInt(ty.impO) || 0);

    // 2. Impact CAISSE : Basé UNIQUEMENT sur le "Détail Cash"
    const aSaisiCash = (mixUSD > 0 || mixCDF > 0 || commUSD > 0 || commCDF > 0);
    const dirCaisse = aSaisiCash ? (parseInt(ty.impC) || 0) : 0;

    t.impacts.caisse.USD = netCashUSD * dirCaisse;
    t.impacts.caisse.CDF = netCashCDF * dirCaisse;

    applyImpacts(t);

    // Sauvegarde avec distinction SIM vs CASH pour l'historique
    data.transactions.unshift({
        ...t,
        date: new Date().toLocaleString(),
        desc: `${ty.name} - ${op.name} (${person ? 'NOM: '+person+' | ' : ''}${motif})${!aSaisiCash ? ' [SANS CASH]' : ''}`,
        amtSIM: amtSIM, // Le montant "Virtuel"
        curSIM: cur,
        usdCash: netCashUSD, // Le montant "Physique"
        cdfCash: netCashCDF
    });

    save();
    alert(aSaisiCash ? "Opération enregistrée (SIM & Caisse)" : "Opération enregistrée (SIM uniquement)");
    render();
    
    ["amount","mixUSD","mixCDF","commUSD","commCDF","motif","personName"].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).value = "";
    });
};

window.settleAccount = () => {  
    const opIdx = document.getElementById("settleOpIdx").value;
    const person = document.getElementById("debtPersonName").value.trim();
    const sUSD = parseFloat(document.getElementById("settleUSD").value) || 0;
    const sCDF = parseFloat(document.getElementById("settleCDF").value) || 0;
    const opDette = data.operators[opIdx];
    const taux = parseFloat(data.taux) || 1;

    if(!opDette || !person) return;

    const key = `${normalize(opDette.name)}_${normalize(person)}`;
    const currentDebt = { ...data.debts[key] } || { USD: 0, CDF: 0 };

    // --- LOGIQUE DE FUSION (Multi-Devise) ---
    // 1. On calcule la valeur totale que le client donne (convertie en USD)
    let valeurPaiementRestanteUSD = sUSD + (sCDF / taux);
    
    // 2. On calcule la valeur totale de ce qu'il doit (convertie en USD)
    const valeurDetteTotaleUSD = currentDebt.USD + (currentDebt.CDF / taux);

    // --- ÉTAPE DE REMBOURSEMENT ---
    let recupUSD = 0;
    let recupCDF = 0;

    // A. On s'attaque d'abord à la dette en Dollars
    if (currentDebt.USD > 0) {
        let payeSurUSD = Math.min(valeurPaiementRestanteUSD, currentDebt.USD);
        recupUSD = payeSurUSD;
        valeurPaiementRestanteUSD -= payeSurUSD;
    }

    // B. S'il reste de la valeur dans le paiement, on s'attaque à la dette en FC
    if (currentDebt.CDF > 0 && valeurPaiementRestanteUSD > 0) {
        let payeSurCDF_enUSD = Math.min(valeurPaiementRestanteUSD, currentDebt.CDF / taux);
        recupCDF = payeSurCDF_enUSD * taux;
        valeurPaiementRestanteUSD -= payeSurCDF_enUSD;
    }

    // --- CRÉATION DE LA TRANSACTION ---
    const t = createTransaction({
        typeNom: "REGLEMENT",
        operator: opDette.name,
        mode: normalize(opDette.name).includes("moi") ? "dette_moi" : "dette_client",
        amt: sUSD, cur: "USD", person, mix: { USD: sUSD, CDF: sCDF }
    });

    // IMPACT VNC : On retire EXACTEMENT ce qui a été épongé sur la fiche client
    t.impacts.dette.USD = -recupUSD;
    t.impacts.dette.CDF = -recupCDF;

    // IMPACT CAISSE : On encaisse TOUT (Argent réel en main)
    const isMoi = normalize(opDette.name).includes("moi");
    t.impacts.caisse.USD = isMoi ? -sUSD : sUSD;
    t.impacts.caisse.CDF = isMoi ? -sCDF : sCDF;

    // Neutraliser l'opérateur de base
    t.impacts.operator.USD = 0;
    t.impacts.operator.CDF = 0;

    applyImpacts(t);

    // Description avec calcul du Gain Net
    const gainVNC = Math.max(0, (sUSD + (sCDF / taux)) - (recupUSD + (recupCDF / taux)));

    data.transactions.unshift({
        ...t,
        date: new Date().toLocaleString(),
        desc: `RÈGLEMENT: ${person} ${gainVNC > 0.01 ? '(GAIN: +' + gainVNC.toFixed(2) + '$)' : ''}`,
        usd: sUSD, 
        cdf: sCDF
    });

    save();
    alert("Dette mise à jour avec conversion automatique ✅");
    render();
};

window.cancelTransaction = (index) => {  
    if(!confirm("Annuler cette opération ?")) return;  
  
    const t = data.transactions[index];  
    if(!t) return;

    // Cas spécifique du transfert
    if(t.mode === 'transfert' && t.impacts && t.impacts.isTransfer) {
        const { source, dest } = t.impacts;

        // On remet l'argent à la source
        if(source.idx === "caisse") data.caisse[source.cur] += source.amt;
        else if(data.operators[source.idx]) data.operators[source.idx][source.cur] += source.amt;

        // On retire l'argent de la destination
        if(dest.idx === "caisse") data.caisse[dest.cur] -= dest.amt;
        else if(data.operators[dest.idx]) data.operators[dest.idx][dest.cur] -= dest.amt;

        alert("Transfert inversé avec succès ✅");
    } else {
        // Logique normale pour les autres transactions
        applyImpacts(t, true);
    }
  
    data.transactions.splice(index, 1);  
    save();  
    render();  
    showFullHistory("general");  
};

    window.quickEditOp = (i) => {    
        const op = data.operators[i];    
        const nName = prompt("Nom :", op.name), nUSD = prompt("USD :", op.USD), nCDF = prompt("CDF :", op.CDF), nStk = prompt("SIM :", op.stock);    
        if(nName !== null) { data.operators[i] = { ...op, name: nName, USD: parseFloat(nUSD)||0, CDF: parseFloat(nCDF)||0, stock: parseInt(nStk)||0 }; save(); }    
    };  
  
    window.calcDest = () => {    
        const amt = parseFloat(document.getElementById("srcAmt").value) || 0, t = parseFloat(data.taux) || 1;    
        const sc = document.getElementById("srcCurr").value, dc = document.getElementById("destCurr").value;    
        document.getElementById("destAmt").value = ((sc==="USD" && dc==="CDF") ? amt * t : (sc==="CDF" && dc==="USD") ? amt / t : amt).toFixed(2);    
    };    
  
  window.executeGlobalChange = () => {    
    const sIdx = document.getElementById("srcWallet").value;
    const dIdx = document.getElementById("destWallet").value;    
    const sAmt = parseFloat(document.getElementById("srcAmt").value) || 0;
    const dAmt = parseFloat(document.getElementById("destAmt").value) || 0;    
    const sc = document.getElementById("srcCurr").value;
    const dc = document.getElementById("destCurr").value;
    const motif = document.getElementById("transferMotif").value || "Change/Transfert";

    // --- NOUVELLE CONDITION DE SÉCURITÉ ---
    // On bloque si : 
    // 1. Le montant est 0
    // 2. OU SI (le compte est le même ET la devise est la même)
    if (!sAmt || (sIdx === dIdx && sc === dc)) {
        alert("Action impossible : vous essayez de transférer la même devise sur le même compte.");
        return;
    }

    const sourceName = sIdx === "caisse" ? "Caisse" : data.operators[sIdx].name;
    const destName = dIdx === "caisse" ? "Caisse" : data.operators[dIdx].name;

    // Retrait de la source
    if(sIdx === "caisse") {
        data.caisse[sc] -= sAmt; 
    } else {
        data.operators[sIdx][sc] -= sAmt;
    }

    // Ajout à la destination
    if(dIdx === "caisse") {
        data.caisse[dc] += dAmt; 
    } else {
        data.operators[dIdx][dc] += dAmt;
    }

    const t = { 
        id: Date.now(),
        date: new Date().toLocaleString(), 
        desc: sIdx === dIdx ? `CHANGE: ${sourceName} (${sc} ➔ ${dc})` : `TRANSFERT: ${sourceName} ➔ ${destName}`, 
        amt: sAmt, 
        cur: sc, 
        mode: 'transfert',
        transferDetails: {
            sIdx, dIdx, sAmt, dAmt, sc, dc, sourceName, destName
        },
        impacts: {
            isTransfer: true,
            source: { idx: sIdx, amt: sAmt, cur: sc },
            dest: { idx: dIdx, amt: dAmt, cur: dc }
        }
    };

    data.transactions.unshift(t);    
    save(); 
    render();
    
    // Nettoyage
    document.getElementById("srcAmt").value = "";
    document.getElementById("destAmt").value = "";
    
    alert(sIdx === dIdx ? "Change effectué avec succès ✅" : "Transfert effectué ✅");
};

        const tX = document.getElementById("newTaux").value, uX = document.getElementById("editCashUSD").value, cX = document.getElementById("editCashCDF").value;

    window.exportHistory = () => { let content = "MKA PRO - HISTORIQUE\n"; data.transactions.forEach(t => content += `${t.date} | ${t.desc} | ${t.amt} ${t.cur}\n`); const blob = new Blob([content], {type:"text/plain"}); const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="mka_history.txt"; a.click(); };  
  
    function render() {    
    const t = parseFloat(data.taux) || 1;    
    document.getElementById("caisseUSD").innerText = fmt(data.caisse.USD);    
    document.getElementById("caisseCDF").innerText = fmt(data.caisse.CDF);    
    document.getElementById("rateM").innerText = t;    

    // 1. Valeur du Tiroir (Cash)
    let totalCaisse = (parseFloat(data.caisse.USD) || 0) + ((parseFloat(data.caisse.CDF) || 0) / t);    
    
    let totalSims = 0;     // Argent dans les SIM (Airtel, Orange, Momo...)
    let totalDetteClient = 0; // Argent dehors chez les clients (Actif)
    let totalDetteMoi = 0;    // Argent que je dois aux autres (Passif)
    let totalS = 0;           // Nombre de SIM en stock

    document.getElementById("operatorBalances").innerHTML = data.operators.map((o, i) => {    
        const usd = parseFloat(o.USD) || 0;
        const cdf = parseFloat(o.CDF) || 0;
        const stk = parseInt(o.stock) || 0;
        const px = parseFloat(o.prixAchat) || 0;    
        const n = normalize(o.name);
        const valEquivUSD = usd + (cdf / t);    
        
        let cardClass = "";

        if(n.includes("dette moi")) { 
            cardClass = "negative";
            totalDetteMoi += valEquivUSD; 
        }     
        else if(n.includes("dette client")) { 
            cardClass = "negative"; // Rouge car l'argent n'est pas là, mais c'est un BIEN
            totalDetteClient += valEquivUSD; 
        }     
        else if(n.includes("depense")) {
            cardClass = "negative";
            // Les dépenses ne sont pas stockées dans la VNC (elles sont déjà déduites de la caisse)
        }
        else { 
            // C'est un compte actif (Airtel, Orange, etc.)
            totalSims += (valEquivUSD + (stk * px)); 
        }    
        
        totalS += stk;    
        return `<div class="card ${cardClass}"><b>${o.name}</b>: ${fmt(o.USD)}$ | ${fmt(o.CDF)}FC<br><small>Stock: ${o.stock} SIM</small></div>`;    
    }).join("");    

    // 🔥 LA FORMULE COMPTABLE MIRACLE :
    // VNC = (Cash) + (Soldes SIM + Valeur Stock) + (Dettes des Clients) - (Dettes que je dois)
    const vncFinale = totalCaisse + totalSims + totalDetteClient - totalDetteMoi;

    document.getElementById("totalVNC").innerText = fmt(vncFinale) + " $";    
    document.getElementById("totalStock").innerText = totalS;    

    // Mise à jour des listes déroulantes (Select)
    const opOps = data.operators.map((o, i) => `<option value="${i}">${o.name}</option>`).join("");    
    document.getElementById("operatorSelect").innerHTML = opOps;    
    document.getElementById("srcWallet").innerHTML = '<option value="caisse">Caisse</option>' + opOps;    
    document.getElementById("destWallet").innerHTML = '<option value="caisse">Caisse</option>' + opOps;    
    document.getElementById("paySimSelect").innerHTML = opOps;    
    document.getElementById("settleOpIdx").innerHTML = opOps;    
    document.getElementById("settleDest").innerHTML = '<option value="caisse">🏠 CAISSE (CASH)</option>' + opOps;  
    
    document.getElementById("adminOpEditList").innerHTML = data.operators.map((o,i) => `
        <div class="card">
            ${o.name}
            <button class="btn-del" onclick="deleteOperator(${i})">X</button>
            <button onclick="quickEditOp(${i})" style="width:auto; padding:2px 8px; font-size:10px; background:#0ea5e9; border-radius:5px;">EDIT</button>
        </div>`
    ).join("");    

    document.getElementById("typeSelect").innerHTML = data.types.map((t,i) => `<option value="${i}">${t.name}</option>`).join("");    
    document.getElementById("adminTypeList").innerHTML = data.types.map((t,i) => `
        <div class="card">
            ${t.name}
            <button class="btn-del" onclick="deleteType(${i})">X</button>
        </div>`
    ).join("");    
}
